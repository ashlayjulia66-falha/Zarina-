<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zarina</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: 'Inter', sans-serif;
}

header {
  position: fixed;
  width: 100%;
  padding: 20px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(5px);
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1602751584552-8ba73aad10e1') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1602751584552-8ba73aad10e1') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6); /* ESCURECE A IMAGEM */
  top: 0;
  left: 0;
}

.hero h1 {
  position: relative;
  z-index: 2;
  font-size: 42px;
  font-family: 'Playfair Display', serif;
  color: white;
}

.section {
  padding: 80px 20px;
  text-align: center;
}

.produtos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  position: relative;
  overflow: hidden;
}

.card img {
  width: 100%;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(transparent, black);
}

.nome {
  font-size: 16px;
}

.preco {
  font-size: 14px;
  opacity: 0.7;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 25px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
}

footer {
  padding: 30px;
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<header>ZARINA</header>

<section class="hero">
  <h1>Seja sua própria realeza</h1>
</section>

<section class="section">
  <h2>Coleção</h2>

  <div class="produtos">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
      <div class="overlay">
        <div class="nome">Anel Imperial</div>
        <div class="preco">R$129,90</div>
        <a class="btn" href="https://wa.me/5511983050245?text=Quero%20o%20Anel%20Imperial">Comprar</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603561591411-07134e71a2a9">
      <div class="overlay">
        <div class="nome">Colar Majesty</div>
        <div class="preco">R$99,90</div>
        <a class="btn" href="https://wa.me/5511983050245?text=Quero%20o%20Colar%20Majesty">Comprar</a>
      </div>
    </div>

  </div>

</section>

<footer>
  © Zarina — feito para majestades 
</footer>

</body>
</html>
