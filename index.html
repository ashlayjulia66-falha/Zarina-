<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zarina</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background-color: #0a0a0a;
  color: white;
}

header {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 22px;
  letter-spacing: 4px;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1617038220319-276d3cfab638') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  background: rgba(0,0,0,0.5);
  padding: 20px;
  font-size: 28px;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
}

</style>
</head>

<body>

<header>ZARINA</header>

<section class="hero">
  <h1>Você não usa joias. Você impõe presença.</h1>
</section>

<section class="section">
  <h2>Coleção</h2>
  <p>Peças que falam por você.</p>
  <a class="btn" href="#">Ver produtos</a>
</section>

</body>
</html>
