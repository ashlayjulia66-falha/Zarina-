<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zarina</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: 'Inter', sans-serif;
}

header {
  position: fixed;
  width: 100%;
  padding: 20px;
  text-align: center;
  font-family: 'Playfair Display', serif;
  letter-spacing: 5px;
  background: rgba(0,0,0,0.4);
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1602751584552-8ba73aad10e1') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.7;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
}

.section {
  padding: 80px 20px;
  text-align: center;
}

.produtos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.produto {
  background: #111;
  padding: 15px;
}

.produto img {
  width: 100%;
}

.nome {
  margin-top: 10px;
}

.preco {
  opacity: 0.7;
  font-size: 14px;
}

footer {
  padding: 30px;
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>ZARINA</header>

<section class="hero">
  <div>
    <h1>Seja sua própria realeza</h1>
    <p>Moderno. Luxuoso. Inesquecível.</p>
  </div>
</section>

<section class="section">
  <h2>Coleção</h2>

  <div class="produtos">

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
      <div class="nome">Anel Imperial</div>
      <div class="preco">R$ 129,90</div>
      <a class="btn" href="https://wa.me/5511983050245?text=Quero%20o%20Anel%20Imperial">Faça sua encomenda</a>
    </div>

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1603561591411-07134e71a2a9">
      <div class="nome">Colar Majesty</div>
      <div class="preco">R$ 159,90</div>
      <a class="btn" href="https://wa.me/5511983050245?text=Quero%20o%20Colar%20Majesty">Faça sua encomenda</a>
    </div>

  </div>

</section>

<footer>
  © Zarina — Feito para quem nasceu para brilhar
</footer>

</body>
</html>
